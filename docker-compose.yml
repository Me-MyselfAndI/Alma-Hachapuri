# Local infrastructure for the four-component monorepo:
#   webapp/   — Next.js (run on host)
#   api/      — FastAPI (run on host)
#   db/       — PostgreSQL (this file)
#   storage/  — resume files on disk (run on host)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alma
      POSTGRES_PASSWORD: alma
      POSTGRES_DB: alma
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
